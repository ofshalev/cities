<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>טבלת ערוצי קשר</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 40px;
      direction: rtl;
    }

    .container {
      max-width: 700px;
      margin: auto;
      background: white;
      padding: 24px;
      border-radius: 16px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
    }

    h1 {
      margin-top: 0;
      text-align: center;
      color: #222;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 18px;
    }

    th, td {
      padding: 14px 18px;
      border-bottom: 1px solid #ddd;
      text-align: right;
    }

    th {
      background: #eef2f5;
      font-weight: bold;
    }

    tr:hover {
      background: #f9fbfd;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>ערוצי קשר לפי עיר</h1>

    <table>
      <thead>
        <tr>
          <th>עיר</th>
          <th>ערוץ קשר</th>
        </tr>
      </thead>

      <tbody>
        <tr><td>בני ברק</td><td>מייל</td></tr>
        <tr><td>בת ים</td><td>וואטסאפ</td></tr>
        <tr><td>גבעתיים</td><td>מייל</td></tr>
        <tr><td>חולון</td><td>טלפון</td></tr>
        <tr><td>לוד</td><td>וואטסאפ</td></tr>
        <tr><td>פתח תקווה</td><td>וואטסאפ</td></tr>
        <tr><td>קרית אונו</td><td>מייל</td></tr>
        <tr><td>רמת גן</td><td>מייל</td></tr>
      </tbody>
    </table>
  </div>
</body>
</html>
